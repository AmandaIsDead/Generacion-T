<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pokédex Retro</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>

<body>

<header>

<h1>Pokédex Retro</h1>

<p>
Explorá todos los Pokémon utilizando la PokéAPI
</p>

</header>

<!-- ========================= -->
<!-- MENÚ -->
<!-- ========================= -->

<section class="menu">

<div class="busqueda">

<input
type="text"
id="buscarPokemon"
placeholder="Nombre o número">

<button id="btnBuscar">
Buscar
</button>

</div>

<div class="filtros">

<select id="region">

<option value="">Todas las regiones</option>

<option value="kanto">Kanto</option>
<option value="johto">Johto</option>
<option value="hoenn">Hoenn</option>
<option value="sinnoh">Sinnoh</option>
<option value="unova">Unova</option>
<option value="kalos">Kalos</option>
<option value="alola">Alola</option>
<option value="galar">Galar</option>
<option value="paldea">Paldea</option>

</select>

<select id="tipo">

<option value="">Todos los tipos</option>

<option value="normal">Normal</option>
<option value="fire">Fuego</option>
<option value="water">Agua</option>
<option value="grass">Planta</option>
<option value="electric">Eléctrico</option>
<option value="ice">Hielo</option>
<option value="fighting">Lucha</option>
<option value="poison">Veneno</option>
<option value="ground">Tierra</option>
<option value="flying">Volador</option>
<option value="psychic">Psíquico</option>
<option value="bug">Bicho</option>
<option value="rock">Roca</option>
<option value="ghost">Fantasma</option>
<option value="dragon">Dragón</option>
<option value="dark">Siniestro</option>
<option value="steel">Acero</option>
<option value="fairy">Hada</option>

</select>

<button id="btnFiltrar">
Filtrar
</button>

<button id="btnMostrarTodos">
Mostrar todos
</button>

</div>

</section>

<!-- ========================= -->
<!-- LOADING -->
<!-- ========================= -->

<div id="loading" class="oculto">

<div class="loader"></div>

<p>
Cargando Pokémon...
</p>

</div>

<!-- ========================= -->
<!-- MENSAJES -->
<!-- ========================= -->

<div id="mensajeError" class="mensaje oculto">

<p id="textoError"></p>

<button id="cerrarMensaje">
Aceptar
</button>

</div>

<!-- ========================= -->
<!-- FAVORITOS -->
<!-- ========================= -->

<section class="favoritos">

<h2>

⭐ Favoritos

</h2>

<div id="listaFavoritos"
class="contenedorPokemon">

</div>

</section>

<!-- ========================= -->
<!-- POKÉDEX -->
<!-- ========================= -->

<section>

<h2>

📖 Pokédex

</h2>

<div id="listaPokemon"
class="contenedorPokemon">

</div>

</section>

<!-- ========================= -->
<!-- TEMPLATE -->
<!-- ========================= -->

<template id="templatePokemon">

<div class="card">

<div class="numero">

#000

</div>

<img src="">

<h3></h3>

<div class="tipos">

</div>

<p class="altura"></p>

<p class="peso"></p>

<p class="habilidades"></p>

<button class="favorito">

Agregar a favoritos

</button>

</div>

</template>

<footer>

<p>

Hecho con ❤️ utilizando la PokéAPI

</p>

</footer>

<script src="script.js"></script>

</body>
</html>
